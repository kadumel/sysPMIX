<div class="d-flex align-items-center gap-2 flex-shrink-0 js-analise-add-row">
    <div class="input-group input-group-sm js-qty-stepper" style="width: 7.5rem;">
        <button type="button" class="btn btn-outline-secondary js-qty-minus" aria-label="Diminuir quantidade">
            <i class="bi bi-dash-lg"></i>
        </button>
        <label class="visually-hidden" for="analise-qty-{{ item.codigo_produto }}">Quantidade</label>
        <input type="number" id="analise-qty-{{ item.codigo_produto }}"
               class="form-control text-center js-analise-qty js-qty-input"
               value="1" min="1" max="99999" step="1" inputmode="numeric" pattern="[0-9]*"
               autocomplete="off" title="Quantidade">
        <button type="button" class="btn btn-outline-secondary js-qty-plus" aria-label="Aumentar quantidade">
            <i class="bi bi-plus-lg"></i>
        </button>
    </div>
    <button type="button" class="btn btn-sm btn-outline-primary js-analise-add-cart" data-codigo="{{ item.codigo_produto }}">
        <i class="bi bi-cart-plus me-1"></i>Adicionar
    </button>
</div>
